<!doctype html>
<!-- deploy -->
<html lang="en">
    <head>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-T01ZZ6L53Q"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag("js", new Date());

            gtag("config", "G-T01ZZ6L53Q");
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <title>Hub — Chefrel Baracol</title>
        <meta name="description" content="Launcher for Chefrel Baracol's apps, tools, and case studies" />
        <meta name="theme-color" content="#0c0e16" />
        <link rel="manifest" href="manifest.json" />
        <link rel="icon" href="icon-192.png" />
        <link rel="apple-touch-icon" href="icon-192.png" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="phone">
            <div class="notch"></div>
            <div class="screen" id="screen">
                <div class="statusbar">
                    <span id="clock">--:--</span>
                    <span class="right">
                        <span class="offline-chip" id="offlineChip">Offline</span>
                        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
                            <path
                                d="M8 9.5a1.4 1.4 0 1 1 0 2.8 1.4 1.4 0 0 1 0-2.8Zm0-3.2c1.5 0 2.9.6 4 1.6l-1.2 1.3A4 4 0 0 0 8 8.2c-1.1 0-2.1.4-2.8 1L4 7.9a6 6 0 0 1 4-1.6Zm0-3.3c2.4 0 4.6.9 6.3 2.5l-1.2 1.3A8 8 0 0 0 8 5.5a8 8 0 0 0-5.1 1.9L1.7 6a9.6 9.6 0 0 1 6.3-2.5Z"
                            />
                        </svg>
                        <svg width="20" height="11" viewBox="0 0 20 11" fill="none">
                            <rect x=".5" y=".5" width="17" height="10" rx="2.5" stroke="currentColor" />
                            <rect x="2" y="2" width="12" height="7" rx="1.3" fill="currentColor" />
                            <path d="M19 4v3" stroke="currentColor" stroke-linecap="round" />
                        </svg>
                    </span>
                </div>

                <div class="header">
                    <h1>Hub</h1>
                    <p>Chefrel Baracol — apps &amp; projects</p>
                    <div class="install-row">
                        <button class="install-btn" id="installBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 3v13m0 0-4-4m4 4 4-4M5 20h14" /></svg>
                            Install app
                        </button>
                        <span class="install-hint" id="installHint">Add to Home Screen from Safari's share menu</span>
                    </div>
                </div>

                <div class="search-wrap">
                    <div class="search">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                            <circle cx="11" cy="11" r="7" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                        <input id="searchInput" type="text" placeholder="Search apps" autocomplete="off" />
                    </div>
                </div>

                <div class="grid-scroll">
                    <div class="app-grid" id="appGrid"></div>
                    <div class="empty-state" id="emptyState" style="display: none">No apps match your search.</div>
                </div>

                <div class="dock-wrap">
                    <div class="dock" id="dock"></div>
                    <div class="home-indicator"></div>
                </div>

                <div class="app-overlay" id="appOverlay">
                    <div class="app-toolbar">
                        <button id="backBtn" aria-label="Back">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m15 18-6-6 6-6" /></svg>
                        </button>
                        <span class="name" id="overlayName">App</span>
                        <!-- TODO: cleanup this into Open in External mode button -->
                        <button class="save-btn" id="saveBtn" aria-label="Save for offline" title="Save for offline">
                            <!-- External Icon -->
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                                <path d="M15 3h6v6" />
                                <path d="M10 14 21 3" />
                            </svg>
                            <!-- Save Icon -->
                            <!-- <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                                <path d="M12 3v12m0 0-4-4m4 4 4-4" />
                                <path d="M5 21h14" />
                            </svg> -->
                        </button>
                    </div>
                    <iframe id="appFrame" title="App content"></iframe>
                    <div class="offline-fallback" id="offlineFallback">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M3 3l18 18M8.5 16.5a7 7 0 0 1 7-3.3M5 12.5a11 11 0 0 1 3-2.1M12 20h.01" />
                        </svg>
                        <div>You're offline and this app hasn't been saved yet.</div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
